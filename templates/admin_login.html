<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Админ — вход</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'Becubik';
      src: url('/voice-feedback/static/fonts/Becubik.woff2') format('woff2'),
           url('/voice-feedback/static/fonts/Becubik.woff') format('woff');
      font-weight: normal;
      font-style: normal;
    }
    @font-face {
      font-family: 'Garet';
      src: url('/voice-feedback/static/fonts/Garet.woff2') format('woff2'),
           url('/voice-feedback/static/fonts/Garet.woff') format('woff');
      font-weight: normal;
      font-style: normal;
    }

    :root {
      color-scheme: light;
      --primary: #9da6dc;
      --light-blue: #d2d7f4;
      --grayish: #d9d9e5;
      --lightest: #ececff;
      --white: #ffffff;
      --text: #1a1a2e;
      --muted: #6b6b80;
      --border: #d2d7f4;
      --shadow: 0 8px 40px rgba(157, 166, 220, 0.22);
      --focus-ring: 0 0 0 4px rgba(157, 166, 220, 0.28);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(150deg, var(--lightest) 0%, var(--white) 60%, var(--grayish) 100%);
      font-family: 'Montserrat', 'Garet', system-ui, sans-serif;
      color: var(--text);
      padding: 20px;
    }

    .card {
      width: min(420px, 100%);
      background: var(--white);
      border-radius: 20px;
      box-shadow: var(--shadow);
      padding: 36px 32px;
      border: 1.5px solid var(--border);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 5px 12px;
      border-radius: 999px;
      background: var(--lightest);
      color: var(--primary);
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      border: 1px solid var(--light-blue);
      margin-bottom: 16px;
    }

    h1 {
      font-family: 'Garet', 'Montserrat', sans-serif;
      margin: 0 0 6px;
      font-size: 28px;
      font-weight: normal;
      letter-spacing: -0.01em;
      color: var(--text);
    }

    p.subtitle {
      margin: 0 0 24px;
      color: var(--muted);
      font-size: 13.5px;
      line-height: 1.6;
      font-weight: 500;
    }

    label {
      display: block;
      font-weight: 700;
      margin-bottom: 6px;
      font-size: 13px;
      color: var(--text);
      letter-spacing: 0.01em;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 16px;
    }

    .input-shell {
      display: flex;
      align-items: center;
      border-radius: 12px;
      border: 1.5px solid var(--border);
      background: var(--lightest);
      padding: 2px 10px 2px 12px;
      transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
      gap: 8px;
    }

    .input-shell svg {
      flex-shrink: 0;
      color: var(--primary);
      opacity: 0.7;
    }

    input[type="text"],
    input[type="password"] {
      padding: 11px 4px;
      border-radius: 10px;
      border: none;
      background: transparent;
      font-size: 14px;
      font-family: 'Montserrat', sans-serif;
      font-weight: 500;
      width: 100%;
      color: var(--text);
    }

    input::placeholder { color: #b0b3c8; }
    input:focus { outline: none; }

    .input-shell:focus-within {
      border-color: var(--primary);
      box-shadow: var(--focus-ring);
      background: var(--white);
    }

    .error {
      color: #b91c1c;
      background: #fef2f2;
      border: 1px solid #fecaca;
      padding: 11px 14px;
      border-radius: 12px;
      font-size: 13px;
      margin-bottom: 16px;
      font-weight: 600;
    }

    button[type="submit"] {
      width: 100%;
      padding: 13px 16px;
      border: none;
      border-radius: 12px;
      background: var(--primary);
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      font-family: 'Montserrat', sans-serif;
      letter-spacing: 0.02em;
      cursor: pointer;
      transition: transform 0.12s, box-shadow 0.18s, filter 0.18s;
      box-shadow: 0 6px 24px rgba(157, 166, 220, 0.38);
      margin-top: 4px;
    }

    button[type="submit"]:hover {
      filter: brightness(1.06);
      transform: translateY(-1px);
      box-shadow: 0 10px 30px rgba(157, 166, 220, 0.45);
    }

    button[type="submit"]:active {
      transform: translateY(0);
      box-shadow: 0 4px 12px rgba(157, 166, 220, 0.3);
    }

    @media (max-width: 480px) {
      .card { padding: 26px 20px; }
      h1 { font-size: 24px; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="eyebrow">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="10"/></svg>
      Voice Feedback · Admin
    </div>
    <h1>Вход в админ-панель</h1>
    <p class="subtitle">Управляйте компаниями и отслеживайте отзывы в одном месте.</p>
    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}
    <form method="post">
      <div class="field">
        <label for="login">Логин</label>
        <div class="input-shell">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 12c2.761 0 5-2.462 5-5.5S14.761 1 12 1 7 3.462 7 6.5 9.239 12 12 12ZM4 22c0-3.59 3.134-6.5 7-6.5s7 2.91 7 6.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
          <input id="login" type="text" name="login" placeholder="admin" required autocomplete="username">
        </div>
      </div>
      <div class="field">
        <label for="password">Пароль</label>
        <div class="input-shell">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="4" y="10" width="16" height="10" rx="2" stroke="currentColor" stroke-width="1.6"/>
            <path d="M8 10V7a4 4 0 1 1 8 0v3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
          <input id="password" type="password" name="password" placeholder="••••••••" required autocomplete="current-password">
        </div>
      </div>
      <button type="submit">Войти</button>
    </form>
  </div>
</body>
</html>
