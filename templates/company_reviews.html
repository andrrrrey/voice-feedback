<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Отзывы — {{ company.name }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'Becubik';
      src: url('/voice-feedback/static/fonts/Becubik.woff2') format('woff2'),
           url('/voice-feedback/static/fonts/Becubik.woff') format('woff');
      font-weight: normal;
      font-style: normal;
    }
    @font-face {
      font-family: 'Garet';
      src: url('/voice-feedback/static/fonts/Garet.woff2') format('woff2'),
           url('/voice-feedback/static/fonts/Garet.woff') format('woff');
      font-weight: normal;
      font-style: normal;
    }

    :root {
      --primary: #9da6dc;
      --light-blue: #d2d7f4;
      --grayish: #d9d9e5;
      --lightest: #ececff;
      --white: #ffffff;
      --text: #1a1a2e;
      --muted: #6b6b80;
      --border: #d2d7f4;
      --card-shadow: 0 4px 24px rgba(157, 166, 220, 0.14);
    }

    * { box-sizing: border-box; }

    body {
      font-family: 'Montserrat', 'Garet', system-ui, sans-serif;
      max-width: 980px;
      margin: 0 auto;
      padding: 32px 24px;
      background: linear-gradient(150deg, var(--lightest) 0%, var(--white) 55%, var(--grayish) 100%);
      min-height: 100vh;
      color: var(--text);
    }

    .page-header {
      margin-bottom: 24px;
    }

    .breadcrumb {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 10px;
      text-decoration: none;
    }

    .breadcrumb:hover { color: var(--primary); }

    h1 {
      font-family: 'Becubik', 'Montserrat', sans-serif;
      margin: 0 0 4px;
      font-size: 28px;
      font-weight: normal;
      letter-spacing: -0.01em;
      color: var(--text);
    }

    a { color: var(--primary); text-decoration: none; }
    a:hover { text-decoration: underline; }

    .muted {
      color: var(--muted);
      font-size: 13px;
      font-weight: 500;
    }

    .card {
      background: var(--white);
      border-radius: 16px;
      padding: 20px 22px;
      box-shadow: var(--card-shadow);
      border: 1.5px solid var(--border);
      margin-top: 16px;
    }

    .table-wrapper {
      width: 100%;
      overflow-x: auto;
      border-radius: 12px;
      border: 1.5px solid var(--border);
      margin-top: 14px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 640px;
      background: var(--white);
    }

    th, td {
      padding: 10px 14px;
      border-bottom: 1px solid var(--grayish);
      font-size: 13.5px;
    }

    th {
      text-align: left;
      background: var(--lightest);
      color: var(--muted);
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: #f8f9ff; }

    .tag {
      display: inline-block;
      padding: 3px 9px;
      border-radius: 999px;
      background: var(--lightest);
      font-size: 11px;
      font-weight: 700;
      color: var(--primary);
      border: 1px solid var(--light-blue);
    }

    .tag.positive {
      background: #d1fae5;
      color: #065f46;
      border-color: #a7f3d0;
    }

    .tag.negative {
      background: #fee2e2;
      color: #991b1b;
      border-color: #fecaca;
    }

    .tag.neutral {
      background: var(--lightest);
      color: var(--primary);
      border-color: var(--light-blue);
    }

    .table-note { margin-top: 10px; }

    .actions {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    button {
      padding: 8px 16px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: var(--primary);
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      font-family: 'Montserrat', sans-serif;
      letter-spacing: 0.02em;
      box-shadow: 0 4px 16px rgba(157, 166, 220, 0.3);
      transition: transform 0.12s, box-shadow 0.18s, filter 0.18s;
    }

    button.secondary {
      background: var(--white);
      color: var(--primary);
      border: 1.5px solid var(--light-blue);
      box-shadow: 0 2px 8px rgba(157, 166, 220, 0.12);
    }

    button:hover {
      filter: brightness(1.05);
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
      filter: brightness(0.98);
    }

    @media (max-width: 720px) {
      body { padding: 18px; }
      h1 { font-size: 22px; }
      .card { padding: 16px; }
      .actions { flex-direction: column; align-items: stretch; }
      button { width: 100%; text-align: center; }
      .table-wrapper { margin: 0 -6px; padding: 0 6px; }
    }
  </style>
</head>
<body>
  <div class="page-header">
    <a class="breadcrumb" href="/voice-feedback/admin/login">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
      Назад к панели
    </a>
    <h1>Отзывы — {{ company.name }}</h1>
    <p class="muted">Собранные отзывы по компании. CSV можно скачать из основной панели.</p>
  </div>

  <div class="card">
    <div class="actions">
      <span class="muted">Slug: <strong>{{ company.slug }}</strong></span>
      <button id="refreshBtn" class="secondary" type="button">Обновить</button>
      <button id="backBtn" class="secondary" type="button">Назад</button>
    </div>
    <div id="reviewsContainer" class="muted" style="margin-top: 12px;">Загрузка...</div>
  </div>

  <script>
    const BASE = '/voice-feedback';
    const companyId = {{ company.id }};
    const backBtn = document.getElementById('backBtn');
    const refreshBtn = document.getElementById('refreshBtn');
    const container = document.getElementById('reviewsContainer');

    async function loadReviews() {
      container.textContent = 'Загрузка...';
      try {
        const res = await fetch(`${BASE}/api/admin/reviews?company_id=${companyId}`);
        if (!res.ok) throw new Error('Ошибка загрузки');
        const data = await res.json();
        renderReviews(data);
      } catch (e) {
        console.error(e);
        container.textContent = 'Не удалось загрузить отзывы.';
      }
    }

    function renderReviews(reviews) {
      if (!reviews.length) {
        container.textContent = 'Пока нет отзывов для этой компании.';
        return;
      }
      const table = document.createElement('table');
      table.innerHTML = `
        <thead>
          <tr>
            <th>ID</th>
            <th>Имя</th>
            <th>Тональность</th>
            <th>Текст</th>
            <th>Создан</th>
          </tr>
        </thead>
      `;
      const tbody = document.createElement('tbody');
      reviews.forEach((r) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${r.id}</td>
          <td>${r.user_name || '—'}</td>
          <td>${sentimentTag(r.sentiment)}</td>
          <td>${(r.normalized_text || '').replace(/</g, '&lt;')}</td>
          <td>${new Date(r.created_at).toLocaleString('ru-RU')}</td>
        `;
        tbody.appendChild(tr);
      });
      table.appendChild(tbody);
      const wrapper = document.createElement('div');
      wrapper.className = 'table-wrapper';
      wrapper.appendChild(table);

      container.innerHTML = '';
      container.appendChild(wrapper);
      const note = document.createElement('div');
      note.className = 'muted table-note';
      note.textContent = 'Для выгрузки CSV вернитесь и нажмите «CSV по компании» или общий экспорт.';
      container.appendChild(note);
    }

    function sentimentTag(sentiment) {
      const val = (sentiment || '').toLowerCase();
      let cls = 'neutral';
      if (val.includes('pos')) cls = 'positive';
      if (val.includes('neg')) cls = 'negative';
      return `<span class="tag ${cls}">${sentiment || 'n/a'}</span>`;
    }

    refreshBtn.onclick = loadReviews;
    backBtn.onclick = () => {
      if (document.referrer) {
        window.history.back();
      } else {
        window.location.href = `${BASE}/admin/login`;
      }
    };

    loadReviews();
  </script>
</body>
</html>
